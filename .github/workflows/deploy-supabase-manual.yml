name: Deploy Supabase Manually

on:
  workflow_dispatch:
    inputs:
      deploy_migrations:
        description: "Run supabase db push"
        required: true
        default: true
        type: boolean
      deploy_functions:
        description: "Deploy Supabase Edge Functions"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push database migrations
        if: ${{ inputs.deploy_migrations }}
        run: supabase db push --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy Edge Functions
        if: ${{ inputs.deploy_functions }}
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
